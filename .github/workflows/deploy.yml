name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------
      # CREATE ENV BEFORE BUILD
      # -----------------------------
      - name: Create .env file
        run: |
          echo "VITE_BACKEND_URL=https://api.invoices.ffsdgroup.com" > .env

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      # -----------------------------
      # SETUP SSH
      # -----------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # -----------------------------
      # BACKUP CURRENT RELEASE
      # -----------------------------
      - name: Backup Current Release
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} "
            echo '===== BACKING UP CURRENT RELEASE ====='

            if [ -d /home/invoices.ffsdgroup.com/public_html ]; then
              rm -rf /home/invoices.ffsdgroup.com/public_html_backup
              cp -r /home/invoices.ffsdgroup.com/public_html /home/invoices.ffsdgroup.com/public_html_backup
              echo 'Backup created'
            else
              echo 'No existing release to backup'
            fi
          "

      # -----------------------------
      # DEPLOY NEW BUILD
      # -----------------------------
      - name: Deploy Files
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: deploy
          TARGET: "/home/invoices.ffsdgroup.com/public_html"
          SOURCE: "dist/"
          ARGS: "-rlgDzvc --no-owner --no-group"

      # -----------------------------
      # VERIFY DEPLOYMENT
      # -----------------------------
      - name: Verify Deployment
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} "
            if [ -f /home/invoices.ffsdgroup.com/public_html/index.html ]; then
              echo 'DEPLOY_OK=1' > /tmp/deploy_status
            else
              echo 'DEPLOY_OK=0' > /tmp/deploy_status
            fi
          "

      # -----------------------------
      # ROLLBACK IF FAILED
      # -----------------------------
      - name: Rollback if Failed
        if: failure()
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} "
            echo '===== DEPLOY FAILED - ROLLING BACK ====='

            rm -rf /home/invoices.ffsdgroup.com/public_html
            mv /home/invoices.ffsdgroup.com/public_html_backup /home/invoices.ffsdgroup.com/public_html

            echo 'Rollback completed'
          "

      # -----------------------------
      # FIX PERMISSIONS
      # -----------------------------
      - name: Fix Permissions After Deploy
        if: success()
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} "
            chown -R invoi3574:invoi3574 /home/invoices.ffsdgroup.com/public_html
            chmod -R 755 /home/invoices.ffsdgroup.com/public_html
          "

      - name: Deployment Summary
        run: |
          echo "Deployment completed with rollback protection."
