name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change to your required version

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Sync Files to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: "deploy"
          # TARGET is your live web directory. Update the full absolute path if needed.
          TARGET: "/home/ffsdgroup.com/invoices.ffsdgroup.com/public_html"
          # SOURCE specifies the build folder to copy from. Change "dist" to "build" if using older CRA.
          SOURCE: "dist/" 
          ARGS: "-rlgoDIVzc --delete"
